<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jazz Guitar Progression Coach</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <section class="mega-title">
      <div class="mega-title-inner">
        <h1>Kevin's Super Ultra Custom Jazz Guitar Trainer - Beta 2.0 🎸</h1>
        <div class="title-actions">
          <button id="tunerToggleBtn" type="button" class="mini-tuner-toggle" aria-expanded="false" aria-controls="miniTunerPanel" aria-label="Open mini guitar tuner">Tuner</button>
          <button id="easterEggGuitarBtn" type="button" class="easter-egg-guitar" aria-label="Trigger guitar easter egg">click me 🎸</button>
          <section id="miniTunerPanel" class="mini-tuner-panel" hidden>
            <div class="mini-tuner-header">
              <strong>Mini Guitar Tuner</strong>
              <button id="tunerCloseBtn" type="button" aria-label="Close tuner">Close</button>
            </div>
            <p id="tunerStatus" class="mini-tuner-status">Tap a string for reference tone or start mic.</p>
            <div class="mini-tuner-strings">
              <button type="button" data-tuner-note="E2" data-tuner-frequency="82.41">E2</button>
              <button type="button" data-tuner-note="A2" data-tuner-frequency="110.00">A2</button>
              <button type="button" data-tuner-note="D3" data-tuner-frequency="146.83">D3</button>
              <button type="button" data-tuner-note="G3" data-tuner-frequency="196.00">G3</button>
              <button type="button" data-tuner-note="B3" data-tuner-frequency="246.94">B3</button>
              <button type="button" data-tuner-note="E4" data-tuner-frequency="329.63">E4</button>
            </div>
            <div class="mini-tuner-controls">
              <button id="tunerMicStartBtn" type="button">Start Mic</button>
              <button id="tunerMicStopBtn" type="button" disabled>Stop Mic</button>
            </div>
            <div class="mini-tuner-meter" aria-hidden="true">
              <div class="mini-tuner-meter-track"></div>
              <div class="mini-tuner-meter-center"></div>
              <div id="tunerNeedle" class="mini-tuner-needle"></div>
              <div class="mini-tuner-meter-labels">
                <span>-50</span>
                <span>0</span>
                <span>+50</span>
              </div>
            </div>
            <p id="tunerPitchReadout" class="mini-tuner-readout">Mic: --</p>
          </section>
        </div>
      </div>
    </section>

    <main class="app-shell">
      <aside class="sidebar">
        <nav>
          <ul id="moduleNav" class="module-nav"></ul>
        </nav>
      </aside>

      <section class="lesson-stage">
        <header class="stage-header">
          <div>
            <p id="stageModuleLabel" class="module-label"></p>
            <h2 id="stageTitle"></h2>
          </div>
          <div class="stage-actions">
            <label class="note-toggle">
              <input id="showNoteNamesToggle" type="checkbox" />
              Note Names
            </label>
            <button id="prevModuleBtn" type="button">Previous</button>
            <button id="nextModuleBtn" type="button">Next</button>
          </div>
        </header>

        <article id="lessonContent" class="lesson-content" aria-live="polite"></article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
