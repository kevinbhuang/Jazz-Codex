<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jazz Guitar Progression Coach</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="app-shell">
      <aside class="sidebar">
        <p class="eyebrow">Jazz Guitar Progression Coach</p>
        <h1>Learn Jazz In 3 Steps</h1>
        <p class="sidebar-intro">
          Step 1: learn shell chords on 6th- and 5th-string roots. Step 2: apply those shapes to core progressions. Step 3: map top jazz scales directly to those chords, then play over a drum+bass loop.
        </p>
        <nav>
          <ul id="moduleNav" class="module-nav"></ul>
        </nav>
      </aside>

      <section class="lesson-stage">
        <header class="stage-header">
          <div>
            <p id="stageModuleLabel" class="module-label"></p>
            <h2 id="stageTitle"></h2>
          </div>
          <div class="stage-actions">
            <button id="prevModuleBtn" type="button">Previous</button>
            <button id="nextModuleBtn" type="button">Next</button>
          </div>
        </header>

        <article id="lessonContent" class="lesson-content" aria-live="polite"></article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
